---
# Setup Common Stack
name: Portainer
services:
  # Setup Portainer
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /srv/AppData/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    network_mode: bridge
