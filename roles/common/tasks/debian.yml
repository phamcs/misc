---
# Copy bash stuff
- name: Copy bash stuff
  ansible.builtin.copy:
    src: "{{ item.src}}"
    dest: "{{ item.dest}}"
    mode: 0644
    owner: "{{ app_user }}"
  loop:
    - { src: "files/bashrc", dest: "/home/{{ app_user }}/.bashrc" }
    - { src: "files/bash_profile", dest: "/home/{{ app_user }}/.bash_profile" }

# Debian full system upgrade
- name: Debian system updates
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes
  register: apt_update_result

# Display system upgrade output
- name: Display update output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ apt_update_result.stdout_lines }}"
  when: apt_update_result.stdout_lines is defined

# Check for reboot-required file
- name: Check for reboot-required file
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Notify handler if reboot is required
  ansible.builtin.debug:
    msg: "Reboot is required for {{ inventory_hostname }}"
  when: reboot_required_file.stat.exists == true
  notify: Reboot host

# Install omvextra & docker compose
- name: Install omvextra & docker compose
  ansible.builtin.shell:
    cmd: |
      wget -O - https://github.com/OpenMediaVault-Plugin-Developers/packages/raw/master/install | bash
  when: ansible_os_family == 'Debian'
  register: omvextra_install

# Display omvextra install output
- name: Display omvextra install output
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ omvextra_install.stdout_lines }}"
  when: omvextra_install.stdout_lines is defined

# Install omvextra & docker compose
- name: Install omvextra & docker compose
  ansible.builtin.apt:
    update_cache: yes
    name: "{{ item }}"
  loop:
    # Additional system packages
    - apt-transport-https
    - apache2-utils
    - bmon
    - ca-certificates
    - curl
    - git
    - htop
    - jq
    - lm-sensors
    - python-is-python3
    - python3
    - python3-pip
    - python3-setuptools
    - python3-smbus
    - strace
    - wget
    - zip
    - unzip
    # Docker Stuff
    - openmediavault-compose
    - openmediavault-hosts
    - openmediavault-fail2ban
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin
  when: ansible_os_family == 'Debian'
  register: pkgs_install

# Display packages install output
- name: Display packages install output
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ pkgs_install.stdout_lines }}"
  when: pkgs_install.stdout_lines is defined