---
# Setup Uptime Kuma
services:
  uptime-kuma:
    image: louislam/uptime-kuma:nightly2-rootless
    container_name: uptime-kuma
    user: "1026"
    volumes:
      - /volume1/docker/uptime-kuma:/app/data
    ports:
      - 3001:3001  # <Host Port>:<Container Port>
    restart: always
    network_mode: bridge