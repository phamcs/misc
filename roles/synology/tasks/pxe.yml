---
# Create PXE structure
- name: Create pxe structure
  ansible.builtin.file:
    path: "{{ apps_dir }}/{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ app_user }}"
    group: "users"
    recurse: yes
  loop:
    - pxe
    - pxe/images
    - pxe/pxelinux.cfg

# Copy PXE files
- name: Copy PXE files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
    owner: "{{ app_user }}"
    group: "users"
  loop:
    - { src: 'pxelinux.0', dest: '{{ apps_dir }}/pxe/pxelinux.0' }
    - { src: 'ldlinux.c32', dest: '{{ apps_dir }}/pxe/ldlinux.c32' }
    - { src: 'libutil.c32', dest: '{{ apps_dir }}/pxe/libutil.c32' }
    - { src: 'menu.c32', dest: '{{ apps_dir }}/pxe/menu.c32' }
    - { src: 'memdisk', dest: '{{ apps_dir }}/pxe/memdisk' }

# Copy PXE default config
- name: Copy PXE default config
  ansible.builtin.template:
    src: "default.j2"
    dest: "{{ apps_dir }}/pxe/pxelinux.cfg/default"
    mode: '0644'
    owner: "{{ app_user }}"
    group: "users"

# Download images
- name: Download images
  ansible.builtin.get_url:
    url: "{{ repo_url }}/{{ item }}"
    dest: "{{ apps_dir }}/pxe/images/{{ item }}"
    mode: '0644'
    owner: "{{ app_user }}"
    group: "users"
  loop:
    - vmlinuz
    - initrd.img
