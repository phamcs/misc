---
# Setup Archive Shares
- name: Setup Archive Data Share
  ansible.builtin.import_role:
    name: tafeen.synology.syno_add_shares
  vars:
    syno_shares:
      - name: archive
        description: Archive Data
        path: "{{ archive_dir }}"
        recycle: false
        rights:
          RO:
            - guest
          RW:
            - "{{ syno_user }}"
  register: archive_setup
  until: archive_setup.rc == 0

# Display archive shares output
- name: Display archive shares result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ archive_setup.stdout_lines }}"
  when: archive_setup.stdout_lines is defined

