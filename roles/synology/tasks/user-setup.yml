---
# Setup Python for synology. Make sure python3.9 installed from Package Center before run playbook
# Create el_tracker venv and install requirements
- name: Create el_tracker venv and install requirements
  ansible.builtin.file:
    path: "{{ user_dir }}/{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ syno_user }}"
    recurse: yes
  loop:
    - el_tracker
    - logs

# Copy python install script
- name: Copy python install script
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0755'
    owner: "{{ syno_user }}"
  loop:
    - { src: 'pysetup', dest: '{{ user_dir }}/pysetup' }
    - { src: 'enable_vault_secrets', dest: '{{ user_dir }}/enable_vault_secrets' }
    - { src: 'goldfish_prep', dest: '{{ user_dir }}/goldfish_prep' }
    - { src: 'change_default_ports', dest: '{{ user_dir }}change_default_ports' }
    - { src: 'restore_default_ports', dest: '{{ user_dir }}restore_default_ports' }
    - { src: 'unseal_vault', dest: '{{ user_dir }}unseal_vault' }

# Copy requirements script
- name: Copy requirements script
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
    owner: "{{ syno_user }}"
  loop:
    - { src: 'bashrc', dest: '{{ user_dir }}/.bashrc' }
    - { src: 'bash_profile', dest: '{{ user_dir }}/.bash_profile' }
    - { src: 'My_BSIT_Degree.jpg', dest: '{{ user_dir}}/My_BSIT_Degree.jpg' }
    - { src: 'requirements.txt', dest: '{{ user_dir }}/el_tracker/requirements.txt' }

# Setup Python for user
- name: Setup Python for user
  ansible.builtin.shell: |
    ./pysetup
  args:
    chdir: "{{ user_dir }}"
  register: py_install
  until: py_install.rc == 0

# Display compose output
- name: Display compose result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ py_install.stdout_lines }}"
  when: py_install.stdout_lines is defined

- name: Setup pyvenv for user
  ansible.builtin.shell: |
    cd {{ user_dir }}/el_tracker
    /usr/local/bin/python3.9 -m venv elvenv
    source elvenv/bin/activate
    pip install --upgrade pip setuptools
    pip install -r requirements.txt
  become: true
  become_user: "{{ syno_user }}"
  register: pyvenv_install
  until: pyvenv_install.rc == 0

# Display pyvenv output
- name: Display pyvenv result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ pyvenv_install.stdout_lines }}"
  when: pyvenv_install.stdout_lines is defined