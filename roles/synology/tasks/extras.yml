---
# Create archive directory for synology
- name: Create archive directory
  ansible.builtin.file:
    path: "{{ archive_dir }}/{{ item }}"
    state: directory
    owner: "{{ syno_user }}"
    mode: '0755'
  loop:
    - dump
    - images
    - import
    - private
    - snippets
    - template
    - template/cache
    - template/iso
    - scripts

# Copy apps archive
- name: Copy apps archive
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ syno_user }}"
    mode: 0644
  loop:
    - { src: 'files/AppData.zip', dest: '{{ apps_dir }}/AppData.zip' }
    - { src: 'files/snippets.zip', dest: '{{ archive_dir }}/snippets.zip' }

# Install Golang for synology
- name: Copy and extract tar file
  ansible.builtin.unarchive:
    src: "https://go.dev/dl/go1.26.1.linux-amd64.tar.gz"  # Path to the archive on the Ansible control machine
    dest: /usr/local           # Absolute path on the remote host where the archive will be extracted
    remote_src: true                     # Set to 'yes' if the archive is already on the remote host
    owner: root            # (Optional) User to own the extracted files
    mode: '0755'                       # (Optional) Permissions for the extracted files
    #extra_opts: ['--strip-components=1'] # (Optional) Pass extra options to the unarchive command (e.g., to strip directories)

# Download binaries for synology
- name: Download binaries
  ansible.builtin.get_url:
    url: "{{ repo_url }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    owner: root
  loop:
    - vault
    - docker-credential-vault-login
    - kubectl
    - helm


