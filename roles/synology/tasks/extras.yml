---
# Create archive directory for synology
- name: Create apps directory
  ansible.builtin.file:
    path: "{{ archive_dir }}/{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "users"
    mode: '0755'
  loop:
    - config
    - config/backup

# Install Golang for synology
- name: Copy and extract tar file
  ansible.builtin.unarchive:
    src: "https://go.dev/dl/go1.26.1.linux-amd64.tar.gz"  # Path to the archive on the Ansible control machine
    dest: /usr/local           # Absolute path on the remote host where the archive will be extracted
    remote_src: true                     # Set to 'yes' if the archive is already on the remote host
    owner: root            # (Optional) User to own the extracted files
    mode: '0755'                       # (Optional) Permissions for the extracted files
    #extra_opts: ['--strip-components=1'] # (Optional) Pass extra options to the unarchive command (e.g., to strip directories)

# Install helm for synology
- name: Copy and extract tar file
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-v4.2.1-linux-amd64.tar.gz"  # Path to the archive on the Ansible control machine
    dest: /usr/local/bin           # Absolute path on the remote host where the archive will be extracted
    remote_src: true                     # Set to 'yes' if the archive is already on the remote host
    owner: root            # (Optional) User to own the extracted files
    mode: '0755'                       # (Optional) Permissions for the extracted files
    #extra_opts: ['--strip-components=1'] # (Optional) Pass extra options to the unarchive command (e.g., to strip directories)

# Install docker credential plugin for synology
- name: Copy and extract tar file
  ansible.builtin.unarchive:
    src: "https://github.com/morningconsult/docker-credential-vault-login/releases/download/v0.3.91/docker-credential-vault-login_0.3.91_Linux_x86_64.tar.gz"  # Path to the archive on the Ansible control machine
    dest: /usr/local/bin           # Absolute path on the remote host where the archive will be extracted
    remote_src: true                     # Set to 'yes' if the archive is already on the remote host
    owner: root            # (Optional) User to own the extracted files
    mode: '0755'                       # (Optional) Permissions for the extracted files
    #extra_opts: ['--strip-components=1'] # (Optional) Pass extra options to the unarchive command (e.g., to strip directories)

- name: Uncompress a local file onto the remote server
  ansible.builtin.unarchive:
    src: "https://releases.hashicorp.com/vault/2.0.2/vault_2.0.2_linux_amd64.zip"
    dest: /usr/local/bin/
    mode: 0755

# Download binaries for synology
- name: Download binaries
  ansible.builtin.get_url:
    url: "{{ repo_url }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    owner: root
  loop:
    #- vault
    #- docker-credential-vault-login
    - kubectl
    #- helm

# Copy apps archive
- name: Copy apps archive
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ app_user }}"
    mode: 0644
  loop:
    - { src: 'files/apps.zip', dest: '{{ apps_dir }}/apps.zip' }
    - { src: 'files/config.zip', dest: '{{ archive_dir }}/config.zip' }
    - { src: 'files/scripts.zip', dest: '{{ archive_dir }}/scripts.zip' }

