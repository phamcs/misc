---
# Setup Python for synology. Make sure python3.9 installed from Package Center before run playbook
# Create el_tracker venv and install requirements
- name: Create el_tracker venv and install requirements
  ansible.builtin.file:
    path: "{{ base_dir }}/el_tracker"
    state: directory
    mode: '0755'
    owner: "{{ app_user }}"
    recurse: yes

# Copy python install script
- name: Copy python install script
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0755'
    owner: "{{ app_user }}"
  loop:
    - { src: 'pysetup', dest: '{{ base_dir }}/pysetup' }
    - { src: 'requirements.txt', dest: '{{ base_dir }}/el_tracker/requirements.txt' }
    - { src: 'bashrc', dest: '{{ base_dir }}/.bashrc' }
    - { src: 'bash_profile', dest: '{{ base_dir }}/.bash_profile' }
    - { src: 'NoteStation.nsx', dest: '{{ base_dir }}/NoteStation.nsx' }
    - { src: 'SYNO7AMDFX8350.dss', dest: '{{ base_dir }}/SYNO7AMDFX8350.dss' }
    - { src: 'SYNO7Q8300.dss', dest: '{{ base_dir }}/SYNO7Q8300.dss' }

# Setup Python for user
- name: Setup Python for user
  ansible.builtin.shell: |
    ./pysetup
  args:
    chdir: "{{ base_dir }}"
  register: py_install
  until: py_install.rc == 0

# Display compose output
- name: Display compose result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ py_install.stdout_lines }}"
  when: py_install.stdout_lines is defined

- name: Setup pyvenv for user
  ansible.builtin.shell: |
    cd el_tracker && \
    /usr/local/bin/python3.9 -m venv elvenv && \
    source elvenv/bin/activate && \
    pip install --upgrade pip setuptools && \
    pip install -r requirements.txt
  args:
    chdir: "{{ base_dir }}"
  become: true
  become_user: "{{ app_user }}"
  register: pyvenv_install
  until: pyvenv_install.rc == 0

# Display pyvenv output
- name: Display pyvenv result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ pyvenv_install.stdout_lines }}"
  when: pyvenv_install.stdout_lines is defined