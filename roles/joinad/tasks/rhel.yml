---
# Redhat full system upgrade
- name: "[RHEL] Update packages"
  ansible.builtin.dnf:
    update_cache: yes
    name: "*"
    state: latest
    exclude: "{{ gbt_packages_versionlock|d() }}"
    use_backend: dnf4
  register: _gbt_packages_update_output
  when: ansible_os_family == 'RedHat' or ansible_os_family == 'Rocky'

# Output for debug
- name: "[RHEL] [INFO] Print installed/updated packages"
  when: _gbt_packages_update_output.skipped is not defined
  ansible.builtin.debug:
    var: _gbt_packages_update_output.results|d()

- name: Check for reboot-required file
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Notify handler if reboot is required
  ansible.builtin.debug:
    msg: "Reboot is required for {{ inventory_hostname }}"
  when: reboot_required_file.stat.exists == true
  notify: Reboot host

# Disable Firewalld
- name: Disable FIREWALLD
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  when:
    - ansible_facts.services["firewalld.service"] is defined
    - ansible_facts.services["firewalld.service"].status != "not-found"

# Disable SELINUX that turn on by default in RHEL 8+ and cause issues with docker
- name: Set SELinux to permissive
  ansible.builtin.replace:
    path: /etc/selinux/config
    regexp: '^SELINUX=.*'
    replace: 'SELINUX=disabled'
  register: selinux_config

- name: Reboot to apply changes if modified
  ansible.builtin.reboot:
    reboot_timeout: 300
  when: selinux_config.changed

# Install required packages for (RHEL) platform
- name: Install required packages
  ansible.builtin.shell:
    cmd: |
      dnf install -y realmd sssd oddjob oddjob-mkhomedir adcli samba-common-tools
      realm discover {{ domain }}
  when: ansible_os_family == 'RedHat' or ansible_os_family == 'Rocky'
