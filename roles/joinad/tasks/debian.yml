---
# Copy bash stuff
- name: Copy bash stuff
  ansible.builtin.copy:
    src: "{{ item.src}}"
    dest: "{{ item.dest}}"
    mode: 0644
    owner: "{{ app_user }}"
  loop:
    - { src: "files/bashrc", dest: "/home/{{ app_user }}/.bashrc" }
    - { src: "files/bash_profile", dest: "/home/{{ app_user }}/.bash_profile" }

# Debian full system upgrade
- name: Debian system updates
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes
  register: apt_update_result

# Display system upgrade output
- name: Display update output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ apt_update_result.stdout_lines }}"
  when: apt_update_result.stdout_lines is defined

# Check for reboot-required file
- name: Check for reboot-required file
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Notify handler if reboot is required
  ansible.builtin.debug:
    msg: "Reboot is required for {{ inventory_hostname }}"
  when: reboot_required_file.stat.exists == true
  notify: Reboot host

# Install required packages for (DEB) platform
- name: Install required packages
  ansible.builtin.shell:
    cmd: |
      apt update && apt install -y realmd sssd sssd-common sssd-ad sssd-common-lfs sssd-tools adcli krb5-user packagekit
      realm discover {{ domain }}

# Join server to domain
- name: Join Server to Domain
  ansible.builtin.shell:
    cmd: |
      realm join {{ domain }} -U administrator
  register: join_output

# Display join output
- name: Display join command's standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ join_output.stdout_lines }}"