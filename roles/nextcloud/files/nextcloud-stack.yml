---
name: nextcloud
services:
  nextcloud:
    user: "1000"
    image: nextcloud:apache
    container_name: nextcloud
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    restart: always
    ports:
      - 8080:80
    volumes:
      - /srv/AppData/nextcloud:/var/www/html
      - /srv/AppData/nextcloud/apps:/var/www/html/apps
      - /srv/AppData/nextcloud/config:/var/www/html/config
      - /srv/AppData/nextcloud/data:/var/www/html/data
      - /srv/dev-disk-by-uuid-b5f61a9b-1827-498b-a77b-7caf811c025b/DATA/ARCHIVE:/var/www/html/data/archive
    environment:
      # Nextcloud configuration
      - NEXTCLOUD_DATA_DIR=/var/www/html/data
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.superasian.net
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_LIMIT=512M
      # Database configuration
      - POSTGRES_HOST=10.0.0.252  # IP or DNS name of external DB
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # secrets:
    #   - postgres_password
    #   - nextcloud_admin_password
    networks:
      - backend

# secrets:
#   nextcloud_admin_password:
#     file: /srv/AppData/nextcloud/secrets/nextcloud_admin_password.txt # put admin password in this file
#   postgres_password:
#     file: /srv/AppData/nextcloud/secrets/postgres_password.txt # put postgresql password in this file
docker exec -it gitlab update-permissions