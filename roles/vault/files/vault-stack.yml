---
networks:
  backend:
    driver: bridge

# Setup HashiCorp Vault
name: Vault
services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    user: "1000"
    ports:
    - "8201:8201"
    - "8200:8200"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    environment:
      VAULT_API_ADDR: "https://vault.superasian.net"
      #VAULT_SKIP_VERIFY: true
      VAULT_LOG_FORMAT: json
      VAULT_LOG_LEVEL: info
      VAULT_CLIENT_TIMEOUT: 60s
    cap_add:
    - IPC_LOCK
    volumes:
      - /srv/AppData/vault/config:/etc/vault.d
      - /srv/AppData/vault/ssl:/opt/vault/ssl
      - /srv/AppData/vault/logs:/var/log/vault
      - /srv/AppData/vault/data:/opt/vault/data
      - /srv/AppData/vault/plugins:/opt/vault/plugins
    networks:
      - backend
    restart: always
    healthcheck:
      retries: 5
    entrypoint: vault server -config=/etc/vault.d/vault.hcl

  # Setup Goldfish
  goldfish:
    # Using the image provided by a community maintainer
    image: mvisonneau/goldfish:latest
    container_name: goldfish
    user: "1000"
    ports:
      # Map container port 8443 to host port 443
      - "8443:443"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    environment:
      # REQUIRED: The address of your running Vault server
      - VAULT_ADDR=https://vault.superasian.net
      - VAULT_SKIP_VERIFY=true
    cap_add:
    - IPC_LOCK
    volumes:
      - /srv/AppData/vault/config/goldfish.hcl:/etc/goldfish/goldfish.hcl:ro
      - /srv/AppData/vault/ssl/tls.crt:/etc/ssl/goldfish.crt:ro
      - /srv/AppData/vault/ssl/tls.key:/etc/ssl/goldfish.key:ro
    restart: unless-stopped
    depends_on:
      - vault
    networks:
      - backend
    entrypoint: goldfish -config=/etc/goldfish/goldfish.hcl
