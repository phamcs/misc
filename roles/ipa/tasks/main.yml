---
# tasks file for roles/ipa
- name: Populate service facts
  ansible.builtin.service_facts: {}

- name: Gather the package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Setup FreeIPA Server on RHEL 8 or Rocky 8
  ansible.builtin.include_tasks: rhel.yml
  when:
    - ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] == "8"
    - ansible_facts['os_family'] == "Rocky" and ansible_facts['distribution_major_version'] == "8"