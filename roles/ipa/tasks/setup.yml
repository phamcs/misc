---
# Setup hostname and /etc/hosts for FreeIPA server
- name: Deploy /etc/hosts from template
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Restart systemd-sysctl

# Install freeipa-server and freeipa-server-dns packages
- name: Install FreeIPA Server and DNS packages
  ansible.builtin.dnf:
    name:
      - freeipa-server
      - freeipa-server-dns
    state: latest
  register: ipa_packages

# Display the result of package installation
- name: Display FreeIPA package installation result
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ ipa_packages.results }}"
  when: ipa_packages.results is defined

# Configure FreeIPA server with default settings
- name: Configure FreeIPA server
  ansible.builtin.shell: |
      ipa-server-install --unattended \
      --realm={{ realm }} \
      --domain={{ domain }} \
      --ds-password={{ ds_password }} \
      --admin-password={{ admin_password }} \
      --mkhomedir \
      --hostname={{ hostname }} \
      --no-pkinit \
      --setup-dns \
      --no-forwarders \
      --no-host-dns \
      --allow-zone-overlap
  register: ipa_install_result
  until: ipa_install_result.rc == 0
  retries: 3
  delay: 30

# Display the result of FreeIPA server installation
- name: Display FreeIPA installation result
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ ipa_install_result.stdout_lines }}"
  when: ipa_install_result.stdout_lines is defined

# Verify that the FreeIPA server is running
- name: Verify FreeIPA server is running
  ansible.builtin.shell: |
      systemctl is-active ipa.service
  register: ipa_status_result
  until: ipa_status_result.stdout == "active"
  retries: 3
  delay: 10

# Initialize the FreeIPA server as admin user to create the initial Kerberos ticket
- name: Initialize FreeIPA server as admin user to create initial Kerberos ticket
  ansible.builtin.shell: |
      echo "{{ admin_password }}" | kinit admin@{{ realm }}
  register: ipa_init_result
  until: ipa_init_result.rc == 0
  retries: 3
  delay: 10
  when: ipa_install_result.rc == 0

# Display the result of FreeIPA server initialization
- name: Display FreeIPA initialization result
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ ipa_init_result.stdout_lines }}"
  when: ipa_init_result.stdout_lines is defined

# Create group and sudo rules
- name: Create group and sudo rules
  ansible.builtin.shell: |
    # Create Group
    ipa group-add sysadmins --desc="System administrators"
    # Create a sudo rule allowing sysadmins to run all commands
    ipa sudorule-add allow-sysadmin-all
    ipa sudorule-add-option allow-sysadmin-all --sudooption='!authenticate'
    ipa sudorule-add-user allow-sysadmin-all --groups=sysadmins
    #ipa sudorule-add-runasuser allow-sysadmin-all --users=root
    ipa sudorule-add-allow-command allow-sysadmin-all --sudocmds=ALL
  register: ipa_sudo_group
  until: ipa_sudo_group.rc == 0
  retries: 3
  delay: 10

# Display the result of group and sudo creation
- name: Display FreeIPA initialization result
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ ipa_sudo_group.stdout_lines }}"
  when: ipa_sudo_group.stdout_lines is defined