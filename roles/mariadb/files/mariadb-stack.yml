---
# Setup MariaDB Stack
services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    user: "1000"
    secrets:
      - mysql_root_password
      - mysql_app_password
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MARIADB_PASSWORD_FILE: /run/secrets/mysql_app_password
      MARIADB_DATABASE: kuma
      MARIADB_USER: apps_user
    ports:
      - "3306:3306"
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    volumes:
      - /srv/AppData/mariadb/config/50-server.cnf:/etc/mysql/mariadb.conf.d/50-server.cnf:ro
      - /srv/AppData/mariadb/data:/var/lib/mysql
    networks:
      - backend
  # Setup MariaDB-backup
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mariadb-backup
    restart: always
    tty: true
    networks:
      - backend
    volumes:
      - /srv/AppData/mariadb/backup:/backup/mysql
    environment:
      - MYSQL_HOST=mariadb     # Using different ENV format here for reference
    secrets:
      - mysql_root_password
  # Setup mysqld-exporter
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    networks:
      - backend
    volumes:
      - /srv/AppData/mariadb/config/mysqld-exporter.cnf:/etc/mysql/conf.d/mysqld-exporter.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysql/conf.d/mysqld-exporter.cnf"
    depends_on:
      - mariadb
  # Setup phpmyadmin for Web-GUI
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOST: mariadb
      MAX_EXECUTION_TIME: 600  # 10 minutes timeout
      UPLOAD_LIMIT: "256M"       # 256M file upload ceiling
      MEMORY_LIMIT: "256M"       # 256M execution memory allowance
    ports:
      - "8090:80"
    command: >
      /bin/sh -c "echo 'ServerName 127.0.0.1' >> /etc/apache2/apache2.conf && /docker-entrypoint.sh apache2-foreground"
    networks:
      - backend
    depends_on:
      - mariadb
# secret files on server
secrets:
  mysql_root_password:
    file: /srv/AppData/mariadb/secrets/db.txt
  mysql_app_password:
    file: /srv/AppData/mariadb/secrets/app.txt
networks:
  backend:
    driver: bridge