---
# Main Monitoring Stack Docker Compose File
# volumes:
#   prometheus_data: {}
#   grafana_data: {}
#   influxdb_data: {}
#   telegraf_data: {}

networks:
  mnet:
    driver: bridge

name: monitoring
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - /srv/AppData/monitoring/prometheus:/etc/prometheus
      - /srv/AppData/monitoring/prometheus/certs:/etc/prometheus/certs
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'      # Adjust retention period
      - '--storage.tsdb.wal-compression'         # Compress write-ahead log
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - mnet
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    ports:
      - "9100:9100"
    networks:
      - mnet
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    environment:
      - CADVISOR_HEALTHCHECK_URL=http://localhost:9092/healthz
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg:ro
    ports:
      - "9092:9092"
    command:
      - '--housekeeping_interval=15s'
      - '--port=9092'
      # Disable crio & podman
      - '--docker_only=true'
    networks:
      - mnet
    restart: unless-stopped

  grafana:
    user: "1000"
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - /srv/AppData/monitoring/grafana:/var/lib/grafana
      - /srv/AppData/monitoring/grafana:/etc/grafana"
      - /srv/AppData/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - /srv/AppData/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=monitoring.superasian.net
      - GF_SERVER_ROOT_URL=https://monitoring.superasian.net
      - GF_SERVER_CERT_FILE=/etc/grafana/grafana.crt
      - GF_SERVER_KEY_FILE=/etc/grafana/grafana.key
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-lokiexplore-app
    ports:
      - "3000:3000"
    networks:
      - mnet
    restart: unless-stopped

  loki:
    user: "1000"
    image: grafana/loki:latest
    container_name: loki
    networks:
      - mnet
    ports:
      - 3100:3100
    volumes:
      - /srv/AppData/monitoring/loki/data:/loki
      - /srv/AppData/monitoring/loki:/etc/loki
      - /srv/AppData/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: 
      - '--config.file=/etc/loki/loki-config.yml'
      - '--config.expand-env=true'
      - '--target=all'
      - '--validation.discover-log-levels=true'
      - '--pattern-ingester.enabled=true'
      - '--ingester.wal-enabled=true'
      - '--ingester.wal-compression=true'
      # Disable structured metadata to reduce log size and improve performance and needed for schema v13 upgrade
      - '--validation.allow-structured-metadata=false'
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    logging:
      driver: journald
      options:
        tag: promtail
    depends_on:
      - loki
    links:
      - loki
    ports:
      - 9080:9080
    networks:
      - mnet
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/AppData/monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /srv/AppData/monitoring/promtail:/etc/promtail
    command: 
      - '--config.file=/etc/promtail/promtail-config.yml'
    restart: unless-stopped
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - /srv/AppData/monitoring/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - mnet
    restart: unless-stopped

  ## Influxdb Service
  influxdb2:
    user: "1000"
    image: influxdb:latest
    container_name: influxdb2
    ports:
      - "8086:8086"
    networks:
      - mnet
    volumes:
      - type: bind
        source: /srv/AppData/monitoring/influxdb/data
        target: /var/lib/influxdb2
      - type: bind
        source: /srv/AppData/monitoring/influxdb
        target: /etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=k0ng
      - DOCKER_INFLUXDB_INIT_PASSWORD=Influxdb123
      - DOCKER_INFLUXDB_INIT_ORG=PHAMCS
      - DOCKER_INFLUXDB_INIT_BUCKET=chooseBucketName
      - DOCKER_INFLUXDB_INIT_RETENTION=1w
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=p9avK9R4234nWVeyC9YovQPL
    restart: unless-stopped

  ## Telegraf Service
  telegraf:
    image: telegraf:latest
    pid: "host"
    container_name: telegraf
    depends_on:
      - influxdb2
    links:
      - influxdb2
    ports:
      - "8092:8092"
      - "8094:8094"
      - "8125:8125"
    networks:
      - mnet
    volumes:
      - /srv/AppData/monitoring/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
    restart: unless-stopped