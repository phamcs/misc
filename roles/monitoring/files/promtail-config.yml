server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml
  sync_period: 10s

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: system
  static_configs:
  - targets:
      - "localhost"
    labels:
      job: varlogs
      __path__: /var/log/*log

- job_name: libvirt
  static_configs:
  - targets:
      - "localhost"
    labels:
      job: libvirtlogs
      __path__: /var/log/libvirt/qemu/*log

- job_name: containers
  static_configs:
  - targets:
      - "localhost"
    labels:
      job: containerlogs
      __path__: /var/lib/docker/containers/*/*log

  pipeline_stages:
  - json:
      expressions:
        log: log
        stream: stream
        time: time
        tag: attrs.tag
        compose_project: attrs."com.docker.compose.project"
        compose_service: attrs."com.docker.compose.service"
        stack_name: attrs."com.docker.stack.namespace"
        swarm_service_name: attrs."com.docker.swarm.service.name"
        swarm_task_name: attrs."com.docker.swarm.task.name"

  - regex:
      expression: "^/var/lib/docker/containers/(?P<container_id>.{12}).+/.+-json.log$"
      source: filename
  - timestamp:
      format: RFC3339Nano
      source: time
  - labels:
      stream:
      container_id:
      tag:
      compose_project:
      compose_service:
      stack_name:
      swarm_service_name:
      swarm_task_name:
  - output:
      source: log

  - metrics:
      http_requests_total:
        type: Counter
        description: "Total HTTP requests"
        source: status
        config:
          match_all: true
          action: inc

      http_request_size_bytes:
        type: Histogram
        description: "HTTP request size"
        source: size
        config:
          buckets: [100, 1000, 10000, 100000, 1000000]

- job_name: docker
  docker_sd_configs:
    - host: unix:///var/run/docker.sock
      refresh_interval: 5s
      filters:
        - name: label
          values: ["logging=promtail"]
  relabel_configs:
    # Keep only containers with logging label
    - source_labels: ['__meta_docker_container_label_logging']
      regex: promtail
      action: keep
    # Container name
    - source_labels: ['__meta_docker_container_name']
      regex: '/(.*)'
      target_label: container
    # Container ID
    - source_labels: ['__meta_docker_container_id']
      target_label: container_id
    # Image name
    - source_labels: ['__meta_docker_container_image']
      target_label: image
    # Log stream
    - source_labels: ['__meta_docker_container_log_stream']
      target_label: stream
    # Custom labels from container
    - source_labels: ['__meta_docker_container_label_app']
      target_label: app
    - source_labels: ['__meta_docker_container_label_environment']
      target_label: environment
    # Compose service name
    - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
      target_label: compose_service
    # Compose project name
    - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
      target_label: compose_project
  pipeline_stages:
    - json:
        expressions:
          log: log
          stream: stream
          time: time
    - labels:
        stream:
    - timestamp:
        source: time
        format: RFC3339Nano
    - output:
        source: log