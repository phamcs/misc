---
# Create Monitoring stack directories
- name: Create Monitoring directories
  ansible.builtin.file:
    path: "{{ mon_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
    recurse: yes
  loop:
    - alertmanager
    - grafana
    - influxdb
    - loki
    - prometheus
    - promtail
    - telegraf
    - tempo

# Create Influxdb Directory
- name: Create Influxdb directory
  ansible.builtin.file:
    path: "{{ influxdb_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - data

# Create Loki Directory
- name: Create Loki directory
  ansible.builtin.file:
    path: "{{ loki_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - data

# Create Promtail Directory
- name: Create promtail directory
  ansible.builtin.file:
    path: "{{ promtail_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - data

# Create Grafana Directory
- name: Create Grafana directory
  ansible.builtin.file:
    path: "{{ grafana_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - certs
    - data
    - dashboards
    - plugins
    - provisioning

# Create Grafana Sub Directory
- name: Create Grafana sub directory
  ansible.builtin.file:
    path: "{{ grafana_dir }}/provisioning/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - dashboards
    - datasources

# Create Prometheus Directory
- name: Create Prometheus directory
  ansible.builtin.file:
    path: "{{ prometheus_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - certs
    - data
    - rules

# Create Telegraf Directory
- name: Create Telegraf directory
  ansible.builtin.file:
    path: "{{ telegraf_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - data

# Create Tempo Directory
- name: Create Tempo directory
  ansible.builtin.file:
    path: "{{ tempo_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - blocks
    - config
    - data
    - generator
    - generator/blocks
    - generator/wal
    - wal

# Copy monitoring config & certs
- name: Copy monitoring config & certs
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: 0644
    owner: "{{ app_user }}"
  loop:
    - { src: 'files/system-overview.json', dest: '{{ grafana_dir }}/dashboards/system-overview.json' }
    - { src: 'files/dashboards.yml', dest: '{{ grafana_dir }}/dashboards/dashboards.yml' }
    - { src: 'files/dashboards.yml', dest: '{{ grafana_dir }}/provisioning/dashboards/dashboards.yml' }
    - { src: 'files/datasource.yml', dest: '{{ grafana_dir }}/provisioning/datasources/datasource.yml' }
    - { src: 'files/tls.cert', dest: '{{ grafana_dir }}/certs/grafana.crt' }
    - { src: 'files/tls.key', dest: '{{ grafana_dir }}/certs/grafana.key' }
    #- { src: 'files/grafana.ini', dest: '{{ grafana_dir }}/grafana.ini' }
    - { src: 'files/monitoring-stack.yml', dest: '{{ mon_dir }}/monitoring-stack.yml' }
    - { src: 'files/alertmanager-conf.yml', dest: '{{ mon_dir }}/alertmanager/config.yml' }
    - { src: 'files/promtail-config.yml', dest: '{{ promtail_dir }}/promtail-config.yml' }
    - { src: 'files/loki-config.yml', dest: '{{ loki_dir }}/loki-config.yml' }
    - { src: 'files/prometheus.yml', dest: '{{ prometheus_dir }}/prometheus.yml' }
    - { src: 'files/telegraf.conf', dest: '{{ telegraf_dir }}/telegraf.conf' }
    - { src: 'files/container_alerts.yml', dest: '{{ prometheus_dir }}/rules/container_alerts.yml' }
    - { src: 'files/node_alerts.yml', dest: '{{ prometheus_dir }}/rules/node_alerts.yml' }
    - { src: 'files/recording_rules.yml', dest: '{{ prometheus_dir }}/rules/recording_rules.yml' }
    - { src: 'files/tls.cert', dest: '{{ prometheus_dir }}/certs/tls.crt' }
    - { src: 'files/tls.key', dest: '{{ prometheus_dir }}/certs/tls.key' }
    - { src: 'files/tempo.yml', dest: '{{ tempo_dir }}/config/tempo.yml' }

# Change Grafana data directory permission >> https://github.com/grafana/grafana/issues/41217
- name: Change Grafana data directory permission
  ansible.builtin.file:
    path: "{{ grafana_dir }}"
    state: directory
    mode: 0775
    owner: "472"
    group: "root"
    recurse: yes

# Start Monitoring Stack
- name: Start Monitoring stack
  ansible.builtin.command:
    chdir: "{{ mon_dir }}"
    cmd: "docker compose -f monitoring-stack.yml up -d"
  register: compose_result
  until: compose_result.rc == 0
  retries: 5
  delay: 10

# Display compose output
- name: Display compose result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ compose_result.stdout_lines }}"
  when: compose_result.stdout_lines is defined

# Copy Monitoring nginx config
- name: Copy monitoring nginx config
  ansible.builtin.template:
    src: "templates/{{ item }}.j2"
    dest: "{{ nginx_dir }}/conf.d/{{ item }}"
    mode: 0644
    owner: root
  loop:
    - monitoring.conf
  notify: Restart nginx
