---
# Create Monitoring stack directories
- name: Create Monitoring directories
  ansible.builtin.file:
    path: "{{ mon_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
    recurse: yes
  loop:
    - alertmanager
    - grafana
    - influxdb
    - loki
    - prometheus
    - promtail
    - telegraf
    - tempo

# Create Alertmanager Sub Directory
- name: Create Alertmanager Sub directory
  ansible.builtin.file:
    path: "{{ alertmanager_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - config
    - data

# Create Grafana Directory
- name: Create Grafana directory
  ansible.builtin.file:
    path: "{{ grafana_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - data
    - data/certs
    - data/dashboards
    - data/logs
    - data/plugins
    - provisioning

# Create Grafana Sub Directory
- name: Create Grafana sub directory
  ansible.builtin.file:
    path: "{{ grafana_dir }}/provisioning/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - dashboards
    - datasources

# Create Influxdb Sub Directory
- name: Create Influxdb Sub directory
  ansible.builtin.file:
    path: "{{ influxdb_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - config
    - data

# Create Loki Sub Directory
- name: Create Loki Sub Directory
  ansible.builtin.file:
    path: "{{ loki_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - config
    - data

# Create Prometheus Directory
- name: Create Prometheus directory
  ansible.builtin.file:
    path: "{{ prometheus_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - certs
    - rules

# Create Promtail SubDirectory
- name: Create Promtail Sub Directory
  ansible.builtin.file:
    path: "{{ promtail_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - config
    - data

# Create Telegraf Directory
- name: Create Telegraf directory
  ansible.builtin.file:
    path: "{{ telegraf_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - config
    - data

# Create Tempo Directory
- name: Create Tempo directory
  ansible.builtin.file:
    path: "{{ tempo_dir }}/{{ item }}"
    state: directory
    mode: 0755
    owner: "{{ app_user }}"
  loop:
    - config
    - data/blocks
    - data/wal
    - data/generator
    - data/generator/traces
    - data/generator/wal

# Copy monitoring config & certs
- name: Copy monitoring config & certs
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: 0644
    owner: "{{ app_user }}"
  loop:
    - { src: 'files/system-overview.json', dest: '{{ grafana_dir }}/data/dashboards/system-overview.json' }
    - { src: 'files/Linux-Exporter-Node-14513_rev2.json', dest: '{{ grafana_dir }}/data/dashboards/Linux-Exporter-Node-14513_rev2.json' }
    - { src: 'files/dashboards.yml', dest: '{{ grafana_dir }}/data/dashboards/dashboards.yml' }
    - { src: 'files/dashboards.yml', dest: '{{ grafana_dir }}/provisioning/dashboards/dashboards.yml' }
    - { src: 'files/datasource.yml', dest: '{{ grafana_dir }}/provisioning/datasources/datasource.yml' }
    - { src: 'files/tls.cert', dest: '{{ grafana_dir }}/data/certs/grafana.crt' }
    - { src: 'files/tls.key', dest: '{{ grafana_dir }}/data/certs/grafana.key' }
    - { src: 'files/monitoring-stack.yml', dest: '{{ mon_dir }}/monitoring-stack.yml' }
    - { src: 'files/alertmanager.yml', dest: '{{ mon_dir }}/alertmanager/config/alertmanager.yml' }
    - { src: 'files/promtail.yml', dest: '{{ promtail_dir }}/config/promtail.yml' }
    - { src: 'files/loki.yml', dest: '{{ loki_dir }}/config/loki.yml' }
    - { src: 'files/prometheus.yml', dest: '{{ prometheus_dir }}/prometheus.yml' }
    - { src: 'files/telegraf.conf', dest: '{{ telegraf_dir }}/config/telegraf.conf' }
    - { src: 'files/container_alerts.yml', dest: '{{ prometheus_dir }}/rules/container_alerts.yml' }
    - { src: 'files/node_alerts.yml', dest: '{{ prometheus_dir }}/rules/node_alerts.yml' }
    - { src: 'files/recording_rules.yml', dest: '{{ prometheus_dir }}/rules/recording_rules.yml' }
    - { src: 'files/tls.cert', dest: '{{ prometheus_dir }}/certs/prometheus.crt' }
    - { src: 'files/tls.key', dest: '{{ prometheus_dir }}/certs/prometheus.key' }
    - { src: 'files/tempo.yml', dest: '{{ tempo_dir }}/config/tempo.yml' }

# Start Monitoring Stack
- name: Start Monitoring stack
  ansible.builtin.command:
    chdir: "{{ mon_dir }}"
    cmd: "docker compose -f monitoring-stack.yml up -d"
  register: compose_result
  until: compose_result.rc == 0
  retries: 5
  delay: 10

# Display compose output
- name: Display compose result standard output lines
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ compose_result.stdout_lines }}"
  when: compose_result.stdout_lines is defined

# Copy Monitoring nginx config
- name: Copy monitoring nginx config
  ansible.builtin.template:
    src: "templates/{{ item }}.j2"
    dest: "{{ nginx_dir }}/conf.d/{{ item }}"
    mode: 0644
    owner: root
  loop:
    - monitoring.conf
  notify: Restart nginx
