---
name: Wordpress
services:
  # Setup MariaDB
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    user: "1000"
    secrets:
      - mysql_root_password
      - mysql_app_password
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MARIADB_PASSWORD_FILE: /run/secrets/mysql_app_password
      MARIADB_DATABASE: wordpress
      MARIADB_USER: apps_user
    ports:
      - "3306:3306"
    volumes:
      - /srv/AppData/mariadb/config/50-server.cnf:/etc/mysql/mariadb.conf.d/50-server.cnf:ro
      - /srv/AppData/mariadb/data:/var/lib/mysql
    networks:
      - backend
  # Setup Wordpress
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    volumes:
      # WordPress installation files
      - /srv/AppData/wordpress/data:/var/www/html
      # Custom PHP settings for uploads
      - /srv/AppData/wordpress/config/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: apps_user
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      # Security keys - generate at https://api.wordpress.org/secret-key/1.1/salt/
      # WORDPRESS_AUTH_KEY: ${WP_AUTH_KEY}
      # WORDPRESS_SECURE_AUTH_KEY: ${WP_SECURE_AUTH_KEY}
      # WORDPRESS_LOGGED_IN_KEY: ${WP_LOGGED_IN_KEY}
      # WORDPRESS_NONCE_KEY: ${WP_NONCE_KEY}
      # WORDPRESS_AUTH_SALT: ${WP_AUTH_SALT}
      # WORDPRESS_SECURE_AUTH_SALT: ${WP_SECURE_AUTH_SALT}
      # WORDPRESS_LOGGED_IN_SALT: ${WP_LOGGED_IN_SALT}
      # WORDPRESS_NONCE_SALT: ${WP_NONCE_SALT}
      # # Table prefix
      WORDPRESS_TABLE_PREFIX: wp_
    command: '--default-authentication-plugin=mysql_native_password'
    depends_on:
      - mariadb
    links:
      - mariadb
    networks:
      - backend
  # Setup MariaDB-ackup
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mariadb-backup
    restart: always
    tty: true
    networks:
      - backend
    volumes:
    - /srv/AppData/mariadb/backup:/backup/mysql
    environment:
    - MYSQL_HOST=mariadb
    secrets:
      - mysql_root_password
  # Setup mysqld-exporter
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    networks:
      - backend
    volumes:
      - /srv/AppData/mariadb/config/custom.cnf:/etc/mysql/conf.d/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysql/conf.d/my.cnf"
    depends_on:
      - mariadb
  # Setup phpmyadmin for Web-GUI
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    environment:
      PMA_HOST: mariadb
    ports:
      - "8090:80"
    networks:
      - backend
    depends_on:
      - mariadb
# secret files on server
secrets:
  mysql_root_password:
    file: /srv/AppData/mariadb/secrets/db.txt
  mysql_app_password:
    file: /srv/AppData/mariadb/secrets/app.txt
networks:
  backend:
    driver: bridge